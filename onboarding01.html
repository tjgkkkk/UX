<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NAVI</title>

  <link rel="stylesheet" href="onboarding01.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <script src="libraries/p5.min.js"></script>
  <script src="libraries/p5.sound.min.js"></script>
</head>

<body>
    <div class="container">
    <h1 class="title">환자 정보를 불러와주세요.</h1>

        <div class="card">
            <div class="form-group">
                <div class="label">병원 조회하기</div>
                <div class="input-container hospital-search">
                    <input type="text" id="hospitalInput" placeholder="병원 이름을 입력하세요.">
                    <span class="search-icon" id="searchBtn"><i class="bi bi-search"></i></span>
                    <ul class="search-results" id="searchResults"></ul>
                </div>
            </div>

            <div class="form-group">
                <div class="label">이름</div>
                <div class="input-container">
                    <input type="text" id="nameInput" class="name-input" placeholder="이름을 입력하세요.">
                </div>
            </div>

            <div class="form-group">
                <div class="label">주민등록번호</div>
                <div class="input-container rrn-container">
                    <input type="text" id="rrn1" class="rrn-1" placeholder="_ _ _ _ _ _" maxlength="6">
                    <span class="rrn-dash">—</span>
                    <input type="password" id="rrn2" class="rrn-2" placeholder="_ _ _ _ _ _ _" maxlength="7">
                </div>
            </div>

            <div class="form-group">
                <div class="label">병실</div>
                <div class="input-container room-container">
                    <input type="text" id="roomInput" class="room-input" placeholder="_ _ _ _" maxlength="4">
                    <span class="room-unit">호</span>
                </div>
            </div>
        </div>

    <button class="btn-submit" id="submitBtn">환자 정보 불러오기</button>
</div>
<script src="onboarding01.js"></script>
</body>
</html>
