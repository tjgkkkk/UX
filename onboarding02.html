<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NAVI</title>

  <link rel="stylesheet" href="onboarding02.css">

  <script src="libraries/p5.min.js"></script>
  <script src="libraries/p5.sound.min.js"></script>
</head>

<body>

  <div class="screen-container">
        <h1 class="title">환자 정보를 확인해주세요.</h1>

        <table class="info-table">
            <tr>
                <td class="label">등록번호</td>
                <td class="value" style="width: 220px;" id="patient-id"></td>
                <td class="label">환자성명</td>
                <td class="value" id="patientName" style="width: 220px;">-</td>
                <td class="label">성별 / 나이</td>
                <td class="value" id="patientGenderAge">-</td>
            </tr>
            <tr>
                <td class="label">입원 일시</td>
                <td class="value">26.04.30</td>
                <td class="label">진단명</td>
                <td class="value">경추 및 요추 염좌</td>
                <td class="label">담당 의사</td>
                <td class="value">이익준</td>
            </tr>
            <tr>
                <td colspan="6" class="section-header" id="sectionHeader">입원 상태</td>
            </tr>
            <tr>
                <td class="label">입원 동기</td>
                <td colspan="5" class="value">교통사고 후 통증 치료를 위해 입원</td>
            </tr>
            <tr>
                <td class="label">입원 기간</td>
                <td colspan="5" class="value">26.04.30 - 26.05.14 (2주)</td>
            </tr>
            <tr>
                <td class="label">신체</td>
                <td colspan="5" class="value">164 cm / 55 kg</td>
            </tr>
            <tr>
                <td class="label">현재 주 증상</td>
                <td colspan="5" class="value">목 통증, 허리 통증, 두통 약간, 움직일 때 근육통</td>
            </tr>
            <tr>
                <td class="label">과거 병력</td>
                <td colspan="5" class="value">
                    <div class="checkbox-group">
                        <label><input type="checkbox" checked> 고혈압</label>
                        <label><input type="checkbox"> 당뇨</label>
                        <label><input type="checkbox"> 결핵</label>
                        <label><input type="checkbox"> 관절염</label>
                        <label><input type="checkbox"> 기타 (<input type="text" placeholder="______________">)</label>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="label">입원 경험</td>
                <td colspan="5" class="value">
                    <div class="checkbox-group">
                        <label><input type="checkbox" checked> 없음</label>
                        <label><input type="checkbox"> 있음 (<input type="text" placeholder="______________">)</label>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="label">복용 중인 약</td>
                <td colspan="5" class="value">
                    <div class="checkbox-group">
                        <label><input type="checkbox"> 없음</label>
                        <label><input type="checkbox" checked> 있음 ( 암로디핀 )</label>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="label">가족관계</td>
                <td colspan="5" class="value">
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox"> 배우자 
                            <span class="sub-group">( <label><input type="radio" name="spouse"> 있음</label> <label><input type="radio" name="spouse" checked> 없음</label> )</span>
                        </label>
                        <label>
                            <input type="checkbox"> 자녀 
                            <span class="sub-group">( <label><input type="radio" name="child"> 남</label> <label><input type="radio" name="child"> 여</label> )</span>
                        </label>
                        <label><input type="checkbox"> 부양가족 (<input type="text" placeholder="______________">)</label>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="label">특이사항</td>
                <td colspan="5" class="value">땅콩 알레르기 보유</td>
            </tr>
        </table>

        <div class="button-group">
            <button class="btn-back" id="backBtn">이전으로</button>
            <button class="btn-next" id="nextBtn">다음으로</button>
        </div>
    </div>

<script src="onboarding02.js"></script>

</body>
</html>
